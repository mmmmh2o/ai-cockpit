services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    environment:
      - COCKPIT_HOST=0.0.0.0
      - COCKPIT_PORT=8080

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
